<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Prueba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        #map { height: 500px; width: 100%; border: 2px solid #ccc; }
    </style>
</head>
<body>
    <h1>Mapa de Prueba - CDMX</h1>
    <div id="map"></div>
    <script>
        console.log('Iniciando...');
        var map = L.map('map').setView([19.4326, -99.1332], 12);
        console.log('Mapa creado');
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);
        console.log('Tiles cargados');
        
        L.marker([19.4326, -99.1332]).addTo(map)
            .bindPopup('Ciudad de México')
            .openPopup();
        console.log('Marcador agregado');
    </script>
</body>
</html>
